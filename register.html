<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registert</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center h-screen bg-gray-100">
  <div class="bg-white p-8 shadow-lg rounded-lg w-96">
    <h2 class="text-2xl font-bold mb-6 text-center">สมัครสมาชิก</h2>
    <form>
      <input type="text" placeholder="ชื่อผู้ใช้" class="w-full mb-4 px-4 py-2 border rounded">
      <input type="email" placeholder="อีเมล" class="w-full mb-4 px-4 py-2 border rounded">
      <input type="password" placeholder="รหัสผ่าน" class="w-full mb-4 px-4 py-2 border rounded">
      <button class="w-full bg-indigo-600 text-white py-2 rounded">สมัคร</button>
    </form>
    <p class="mt-4 text-center text-gray-600">มีบัญชีแล้ว? 
      <a href="login.html" class="text-indigo-600">เข้าสู่ระบบ</a>
    </p>
  </div>
</body>
</html>
