<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-950 text-gray-200 font-sans tracking-wide">

  <video autoplay muted loop playsinline class="absolute top-0 left-0 w-full h-full object-cover z-0">
    <source src="./assets/wallpaper/futuristicBG.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <div class="absolute inset-0 z-0 overflow-hidden">
    <div class="bg-cover bg-center h-full w-full opacity-20"
      style="background-image: url('https://images.unsplash.com/photo-1621217646638-3165b6329e46?q=80&w=2940&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');">
    </div>
    <div class="absolute inset-0 bg-gradient-to-t from-gray-950 to-transparent"></div>
  </div>

  <div
    class="relative z-10 w-full max-w-sm p-8 rounded-3xl shadow-[0_0_40px_rgba(0,0,0,0.5)] bg-gray-900/60 backdrop-blur-xl border border-gray-800 transform scale-95 transition-all duration-300 hover:scale-100">
    <h2 class="text-3xl font-extrabold text-center text-white mb-6 animate-pulse">
      Create Your Account
    </h2>

    <form>
      <div class="relative z-0 w-full mb-6 group">
        <input type="text" name="username" id="username"
          class="block w-full py-2.5 px-0 text-lg text-gray-100 bg-transparent border-0 border-b-2 border-gray-600 appearance-none focus:outline-none focus:ring-0 focus:border-purple-500 peer"
          placeholder=" " required />
        <label for="username"
          class="absolute text-sm text-gray-400 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">Username</label>
      </div>

      <div class="relative z-0 w-full mb-6 group">
        <input type="email" name="email" id="email"
          class="block w-full py-2.5 px-0 text-lg text-gray-100 bg-transparent border-0 border-b-2 border-gray-600 appearance-none focus:outline-none focus:ring-0 focus:border-purple-500 peer"
          placeholder=" " required />
        <label for="email"
          class="absolute text-sm text-gray-400 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">Email</label>
      </div>

      <div class="relative z-0 w-full mb-6 group">
        <input type="password" name="password" id="password"
          class="block w-full py-2.5 px-0 text-lg text-gray-100 bg-transparent border-0 border-b-2 border-gray-600 appearance-none focus:outline-none focus:ring-0 focus:border-purple-500 peer"
          placeholder=" " required />
        <label for="password"
          class="absolute text-sm text-gray-400 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">Password</label>
      </div>

      <div class="relative z-0 w-full mb-8 group">
        <input type="password" name="confirm_password" id="confirm_password"
          class="block w-full py-2.5 px-0 text-lg text-gray-100 bg-transparent border-0 border-b-2 border-gray-600 appearance-none focus:outline-none focus:ring-0 focus:border-purple-500 peer"
          placeholder=" " required />
        <label for="confirm_password"
          class="absolute text-sm text-gray-400 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-[0] peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6">Confirm
          Password</label>
      </div>

      <button type="submit"
        class="w-full text-center bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-full shadow-lg transition-all duration-300 transform hover:scale-105 hover:shadow-xl focus:outline-none focus:ring-2 focus:ring-purple-500 focus:ring-offset-2 focus:ring-offset-gray-900">
        Create Account
      </button>

      <p class="text-sm text-gray-500 mt-6 text-center">
        Already have an account?
        <a href="login.html"
          class="text-purple-400 hover:underline hover:text-purple-300 transition-colors duration-300">Login</a>
      </p>
    </form>
  </div>
</body>

</html>
